name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - ""
          - "--features sonar"
          - "--features audio"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: clippy

      - name: Install audio dependencies (for audio feature)
        if: contains(matrix.features, 'audio')
        run: |
          sudo apt-get update
          sudo apt-get install -y libpulse-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.features }}

      - name: Run clippy
        run: cargo clippy --all-targets --locked ${{ matrix.features }} -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - ""
          - "--features sonar"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.features }}

      - name: Run tests
        run: cargo test --locked ${{ matrix.features }}

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - ""
          - "--features sonar"
          - "--features audio"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Install audio dependencies (for audio feature)
        if: contains(matrix.features, 'audio')
        run: |
          sudo apt-get update
          sudo apt-get install -y libpulse-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.features }}

      - name: Build release binary
        run: cargo build --release --locked ${{ matrix.features }}

      - name: Check binary exists
        run: test -f target/release/ssgg
