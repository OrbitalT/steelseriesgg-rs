name: Release

# Builds the Linux release binaries and uploads them as assets on the GitHub
# Release that release-please creates for a v* tag. Versioning and CHANGELOG.md
# are handled by release-please (.github/workflows/release-please.yml); this
# workflow only produces and uploads artifacts.
#
# build-windows.yml and build-arch.yml are separate, manually triggered
# (workflow_dispatch) builds that publish to the workflow run via
# actions/upload-artifact; they do not attach assets to the GitHub Release.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary
        run: tar -C target/${{ matrix.target }}/release -czf ssgg-${{ matrix.target }}.tar.gz ssgg

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ssgg-${{ matrix.target }}.tar.gz
