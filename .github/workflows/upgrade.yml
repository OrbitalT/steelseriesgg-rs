name: upgrade

on:
  workflow_dispatch:

jobs:
  cargo-upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run cargo-upgrade
        uses: meysam81/cargo-upgrade-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
