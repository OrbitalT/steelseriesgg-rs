name: "Copilot Setup Steps"
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Set permissions to the lowest needed. Copilot gets its own token for operations
    permissions:
      contents: write
      actions: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.14
          enable-cache: true
      - uses: oven-sh/setup-bun@v2
      - name: Install tools
        run: |
          uv tool install git+https://github.com/oraios/serena
          bun add -g @biomejs/biome @ast-grep/cli &
          # zagi — agent-optimized git wrapper
          curl -fsL https://raw.githubusercontent.com/mattzcarey/zagi/main/install.sh | bash &
          wait
      - name: Index codebase
        run: |
          uvx --from git+https://github.com/oraios/serena serena project index || :
