name: Arch Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  merge_group:

permissions:
  contents: write

jobs:
  build-arch-package:
    name: Build Arch Package
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm git rust systemd

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .

      - name: Build package
        run: |
          PKGVER=$(sed -n 's/^pkgver=//p' PKGBUILD | head -n1)
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "$PKGVER" != "$TAG_VERSION" ]]; then
              echo "PKGBUILD pkgver ($PKGVER) does not match tag version ($TAG_VERSION)" >&2
              exit 1
            fi
          fi
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git archive --format=tar --prefix="steelseriesgg-rs-${PKGVER}/" --output="ssgg-${PKGVER}.tar" HEAD
          gzip -n "ssgg-${PKGVER}.tar"
          su - builder -c "cd \"$GITHUB_WORKSPACE\" && SRCDEST=\"$GITHUB_WORKSPACE\" makepkg -sCf --noconfirm"

      - name: Generate checksums
        run: |
          sha256sum *.pkg.tar.zst > sha256sums.txt
          cat sha256sums.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            *.pkg.tar.zst
            sha256sums.txt
          fail_on_unmatched_files: true
