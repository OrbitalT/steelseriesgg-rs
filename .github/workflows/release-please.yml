name: Release Please

# Maintains CHANGELOG.md (Keep a Changelog format) and the crate version from
# Conventional Commits. On every push to main it opens or updates a release
# pull request; merging that PR tags v{version} and publishes a GitHub Release
# whose notes are the new changelog section. The v* tag then triggers the
# Linux binary build in release.yml, which uploads its assets to that release.
#
# IMPORTANT: release-please must push the tag with a token other than the
# default GITHUB_TOKEN. GitHub Actions does not start new workflow runs from
# events (including the v* tag push) caused by the built-in GITHUB_TOKEN, so
# release.yml would never fire and no binaries would be attached. Provide a
# RELEASE_PLEASE_TOKEN secret (a fine-grained PAT or GitHub App installation
# token with `contents: write` and `pull-requests: write`) so the tag push is
# attributed to a real identity and triggers the downstream build.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
