name: Build Windows

on:
  workflow_dispatch:
    inputs:
      features:
        description: "Cargo feature flags (e.g. --features sonar)"
        required: false
        default: ""

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked ${{ github.event.inputs.features }}

      - name: Verify binary exists
        run: Test-Path target\release\ssgg.exe
        shell: pwsh

      - name: Compute SHA-256
        shell: pwsh
        run: |
          $hash = (Get-FileHash target\release\ssgg.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  ssgg.exe" | Out-File -Encoding ascii sha256sums.txt
          Get-Content sha256sums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssgg-windows-x86_64
          path: |
            target\release\ssgg.exe
            sha256sums.txt
          retention-days: 30
