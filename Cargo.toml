[package]
name = "steelseries-gg-linux"
version = "0.1.0"
description = "A complete open-source SteelSeries GG replacement for Linux - RGB lighting, audio mixer, and GameSense support"
repository = "https://github.com/Ven0m0/steelseriesgg-rs"
readme = "README.md"
license = "MIT"
edition = "2021"
keywords = ["steelseries", "rgb", "gaming", "linux", "audio"]
categories = ["hardware-support", "games"]

[lib]
name = "steelseries_gg"
path = "src/lib.rs"

[[bin]]
name = "ssgg"
path = "src/main.rs"

[features]
default = []
audio = ["libpulse-binding"]
compat = ["gamesense", "steelseries-sonar"]

[dependencies]
anyhow = "1.0"

# HTTP server for GameSense API
axum = "0.8"

# CLI
clap = { version = "4.5", features = ["derive"] }

# Configuration
directories = "6.0"
hidapi = "=2.6.3" # Pinned to avoid build issues with 2.6.4 requiring libudev-dev

# HTTP client for Sonar API
reqwest = { version = "0.12", features = ["json"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "2.0"
# Async runtime
tokio = { version = "1.49", features = ["rt-multi-thread", "macros"] }
toml = "0.9"
tower-http = { version = "0.6", features = ["cors"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.release]
strip = true
lto = true
codegen-units = 1
panic = "abort"
opt-level = 3
debug = 0

[profile.dev]
debug = 0
split-debuginfo = "packed"
