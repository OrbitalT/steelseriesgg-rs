[package]
name = "AntiBloatLight"
version = "1.0.4"
description = "An open source, lightweight alternative to SteelSeries GG for customising keyboard lighting colours."
repository = "https://github.com/ScepticDope/AntiBloatLight"
readme = "README.md"
license = "MIT"
edition = "2021"

[dependencies]
gamesense = "0.1.2"
hidapi = "=2.6.3" # Pinned to avoid build issues with 2.6.4 requiring libudev-dev
steelseries-sonar = "0.1.0"
tokio = { version = "1.49.0", features = ["rt-multi-thread", "macros"] }
