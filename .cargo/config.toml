# Cargo build configuration for steelseriesgg-rs
#
# This file configures compiler flags and build tools.
# Some optimizations are commented out as they require additional setup:
#
# - sccache: Compilation cache (install: `cargo install sccache`)
# - lld: LLVM linker (install: `sudo apt install lld` or equivalent)
# - -Zthreads: Parallel codegen (requires nightly Rust)

[build]
rustflags = ["-Ctarget-cpu=native"]
# Uncomment if you have sccache installed:
# rustc-wrapper = "sccache"

[target.x86_64-unknown-linux-gnu]
# rustflags = ["-Ctarget-cpu=native"]
# Replace the rustflags line above with this one if you have lld installed for faster linking (do not use both):
rustflags = ["-Ctarget-cpu=native", "-Clink-arg=-fuse-ld=lld"]
